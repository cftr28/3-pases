<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Tus Pases | María & Juan</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="💌 ¡Tienes pases para nuestra Boda!">
    <meta property="og:description" content="Toca aquí para abrir tu sobre y ver tus pases exclusivos.">
    
    <meta property="og:image" content="https://i.imgur.com/vOnH8N0.png">
    <meta property="og:image:secure_url" content="https://i.imgur.com/vOnH8N0.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    
    <meta property="og:url" content="https://cftr28.github.io/2-pases/">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c6a96a;
            --dorado-oscuro: #a68b4f;
            --crema: #fdfbf7;
            --texto: #4a4a4a;
            --borde-sobre: #e0ddd5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--crema);
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden;
        }

        /* --- SOBRE --- */
        #sobre-contenedor {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: #e5e0d8;
            display: flex; justify-content: center; align-items: center;
            z-index: 5000;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .envelope {
            position: relative;
            width: 92%; max-width: 500px; height: 300px;
            background: #fcfcfc;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            cursor: pointer;
            perspective: 1500px;
            border-radius: 8px;
            border: 1px solid var(--borde-sobre);
        }

        .envelope .flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f2ee;
            border: 1px solid var(--borde-sobre);
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            z-index: 4;
            transform-origin: top;
            transition: transform 0.9s ease-in-out;
        }

        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }

        .seal {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: radial-gradient(circle, var(--dorado) 0%, var(--dorado-oscuro) 100%);
            border-radius: 50%;
            z-index: 5;
            display: flex; align-items: center; justify-content: center;
            color: white; font-family: 'Great Vibes'; font-size: 20px;
            transition: 0.6s; 
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .envelope.open .seal { opacity: 0; transform: translate(-50%, -100%) scale(0.2); }

        /* --- PASE --- */
        #pases-contenido {
            opacity: 0;
            transform: scale(0.8);
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            display: none;
        }

        .ticket {
            background: white;
            border: 2px solid var(--dorado);
            border-radius: 15px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background-image: radial-gradient(circle at 0 50%, transparent 15px, white 16px), 
                              radial-gradient(circle at 100% 50%, transparent 15px, white 16px);
        }

        .ticket h2 {
            font-family: 'Great Vibes';
            font-size: 45px;
            color: var(--dorado-oscuro);
            margin-bottom: 5px;
        }

        .ticket .linea {
            border-top: 1px dashed var(--dorado);
            margin: 25px 0;
        }

        .ticket .cantidad {
            font-family: 'Playfair Display';
            font-size: 70px;
            color: var(--texto);
            display: block;
            line-height: 1;
        }

        .ticket .pases-texto {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 13px;
            font-weight: 600;
            color: var(--dorado);
        }

        .info-boda {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
            letter-spacing: 1px;
        }

        .reveal {
            display: block !important;
            opacity: 1 !important;
            transform: scale(1) !important;
        }
    </style>
</head>
<body>

    <div id="sobre-contenedor">
        <div class="envelope" id="envelope" onclick="abrirPases()">
            <div class="flap"></div>
            <div class="seal">M & J</div>
            <div style="position: absolute; bottom: 30px; width: 100%; text-align: center; color: var(--dorado-oscuro); z-index: 3;">
                <p style="font-size: 10px; letter-spacing: 3px; font-weight: 600;">PASES EXCLUSIVOS</p>
                <p style="font-size: 9px; margin-top: 5px; opacity: 0.7;">TOCA PARA RECLAMAR</p>
            </div>
        </div>
    </div>

    <div id="pases-contenido">
        <div class="ticket">
            <p style="font-size: 10px; letter-spacing: 3px; color: #bbb; text-transform: uppercase; margin-bottom: 10px;">Pase de Entrada</p>
            <h2>María & Juan</h2>
            <div class="linea"></div>
            <span class="pases-texto">Válido por</span>
            <span class="cantidad">2</span>
            <span class="pases-texto">Personas</span>
            <div class="linea"></div>
            <div class="info-boda">
                <p><b>INVITACIÓN INDIVIDUAL</b></p>
                <p>15 DE ABRIL, 2026</p>
                <p style="margin-top: 15px; font-style: italic; color: var(--dorado-oscuro);">¡Gracias por acompañarnos!</p>
            </div>
        </div>
    </div>

    <script>
        function abrirPases() {
            document.getElementById("envelope").classList.add("open");
            setTimeout(() => {
                const contenedor = document.getElementById("sobre-contenedor");
                contenedor.style.opacity = "0";
                contenedor.style.transform = "translateY(-100%)";
                setTimeout(() => {
                    contenedor.style.display = "none";
                    document.getElementById("pases-contenido").classList.add("reveal");
                }, 800);
            }, 1000);
        }
    </script>
</body>
</html>
